  /telefon/webhooks/recording:
    post:
      summary: Webhook Twilio — zakończenie nagrania (application/x-www-form-urlencoded)
      description: |
        Wywoływany przez Twilio po `RecordingStatus=completed`. Zapisuje URL nagrania i asynchronicznie uruchamia transkrypcję, raport operacyjny oraz `wskazowki_specjalisty` (coaching dla specjalisty).
        W produkcji weryfikowany jest nagłówek `X-Twilio-Signature` (chyba że `TWILIO_SKIP_SIGNATURE_VALIDATION=true`).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                CallSid: { type: string }
                RecordingSid: { type: string }
                RecordingUrl: { type: string }
                RecordingStatus: { type: string }
                RecordingDuration: { type: string }
      responses:
        "204":
          description: Przyjęto (obróbka w tle)
        "403":
          description: Niepoprawny podpis Twilio
