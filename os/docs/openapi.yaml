      responses:
        "200":
          description: `{ success, sid, message }`
        "400":
          description: Walidacja lub brak telefonu pracownika — `code: VALIDATION_FAILED` / `TELEFON_STAFF_PHONE_MISSING`
        "403":
          description: Rola ekipy polowej — `code: TELEFON_TEAM_ROLE_FORBIDDEN` (Brygadzista / Pomocnik nie dzwonią do klientów z tego endpointu)
        "503":
          description: Brak `PUBLIC_BASE_URL` lub Twilio — `TELEFON_PUBLIC_URL_MISSING` / `TELEFON_TWILIO_NOT_CONFIGURED`
        "500":
          description: Błąd Twilio
