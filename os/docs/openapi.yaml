      summary: Rozliczenie zlecenia (zablokowane — zwraca 403)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "403":
          description: `code: PAYROLL_SETTLEMENTS_BLOCKED`
    post:
      summary: Rozliczenie zlecenia — POST (zablokowane — 403)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "403":
          description: `code: PAYROLL_SETTLEMENTS_BLOCKED`
  /ekipy/{id}:
    get:
      summary: Ekipa z listą członków
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ekipa + `czlonkowie`
        "404":
          description: Nie znaleziono
    put:
      summary: Aktualizacja ekipy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EkipaUpdate'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
    delete:
      summary: Usunięcie ekipy (tylko Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
        "403":
          description: Brak roli
  /ekipy/{id}/czlonkowie:
    post:
      summary: Dodanie członka do ekipy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberAdd'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /ekipy/{id}/czlonkowie/{userId}:
    delete:
      summary: Usunięcie członka z ekipy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /godziny:
    post:
      summary: Zgłoszenie godzin przez pomocnika (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GodzinyCreate'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
        "403":
          description: Brak przypisania do zlecenia
  /godziny/do-potwierdzenia:
    get:
      summary: Godziny oczekujące na potwierdzenie (brygadzista)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
  /godziny/wszystkie:
    get:
      summary: Wszystkie zgłoszenia godzin (Kierownik — filtr oddziału)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
  /godziny/{id}/status:
    put:
      summary: Potwierdzenie / odrzucenie godzin (brygadzista)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GodzinyStatusBody'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
        "403":
          description: Tylko brygadzista wpisu
  /role/{id}:
    get:
      summary: Rola po id
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Rekord roli
        "404":
          description: Nie znaleziono
    put:
      summary: Aktualizacja roli (Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate'
      responses:
        "200":
          description: Zaktualizowana rola
        "400":
          description: Duplikat nazwy / walidacja
        "404":
          description: Nie znaleziono
    delete:
      summary: Usunięcie roli (Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
        "400":
          description: Rola systemowa lub w użyciu
        "404":
          description: Nie znaleziono
  /ksiegowosc/faktury/stats:
    get:
      summary: Statystyki faktur (agregaty kwot)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Pola `total`, `przychod_total`, `oplacone`, `nieoplacone` (nazwy jak w API)
  /ksiegowosc/faktury/{id}:
    get:
      summary: Faktura z pozycjami
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Faktura + `pozycje`
        "404":
          description: Nie znaleziono
    delete:
      summary: Usunięcie faktury (tylko Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
        "403":
          description: Brak roli
        "404":
          description: Nie znaleziono
  /ksiegowosc/faktury/{id}/status:
    put:
      summary: Zmiana statusu faktury
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceStatusBody'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
components:
  schemas:
    KlientWrite:
      type: object
      description: Co najmniej jedno z pól `telefon` lub `email` musi być niepuste (Zod).
      properties:
        imie: { type: string, nullable: true }
        nazwisko: { type: string, nullable: true }
        firma: { type: string, nullable: true }
        telefon: { type: string, nullable: true }
        email: { type: string, nullable: true }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        kod_pocztowy: { type: string, nullable: true }
        notatki: { type: string, nullable: true }
        zrodlo: { type: string, nullable: true }
    WycenaCreate:
      type: object
      required: [klient_nazwa]
      properties:
        klient_nazwa: { type: string }
        klient_telefon: { type: string, nullable: true }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        typ_uslugi: { type: string, nullable: true }
        wartosc_szacowana: { oneOf: [{ type: number }, { type: string }], nullable: true }
        opis: { type: string, nullable: true }
        notatki_wewnetrzne: { type: string, nullable: true }
        lat: { oneOf: [{ type: number }, { type: string }], nullable: true }
        lon: { oneOf: [{ type: number }, { type: string }], nullable: true }
        ekipa_id: { oneOf: [{ type: integer }, { type: string }], nullable: true }
        data_wykonania: { type: string, nullable: true }
        godzina_rozpoczecia: { type: string, nullable: true }
        czas_planowany_godziny: { oneOf: [{ type: number }, { type: string }], nullable: true }
    UserCreate:
      type: object
      required: [login, haslo, rola]
      properties:
        login: { type: string }
        haslo: { type: string, minLength: 8 }
        imie: { type: string, nullable: true }
        nazwisko: { type: string, nullable: true }
        email: { type: string, nullable: true }
        telefon: { type: string, nullable: true }
        rola: { type: string }
        oddzial_id: { oneOf: [{ type: integer }, { type: string }], nullable: true }
        stawka_godzinowa: { oneOf: [{ type: number }, { type: string }], nullable: true }
    CompanySettingsWrite:
      type: object
      properties:
        nazwa: { type: string, nullable: true }
        nip: { type: string, nullable: true }
        adres: { type: string, nullable: true }
        kod_pocztowy: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        konto_bankowe: { type: string, nullable: true }
        bank_nazwa: { type: string, nullable: true }
        email: { type: string, nullable: true }
        telefon: { type: string, nullable: true }
    InvoiceLine:
      type: object
      required: [nazwa, ilosc, cena_netto, vat_stawka]
      properties:
        nazwa: { type: string }
        jednostka: { type: string }
        ilosc: { type: number }
        cena_netto: { type: number }
        vat_stawka: { type: number }
    InvoiceCreate:
      type: object
      required: [klient_nazwa, pozycje]
      properties:
        task_id: { type: integer, nullable: true }
        klient_nazwa: { type: string }
        klient_nip: { type: string, nullable: true }
        klient_adres: { type: string, nullable: true }
        klient_email: { type: string, nullable: true }
        klient_typ: { type: string, nullable: true }
        data_wystawienia: { type: string, nullable: true }
        data_sprzedazy: { type: string, nullable: true }
        termin_platnosci: { type: string, nullable: true }
        forma_platnosci: { type: string, nullable: true }
        uwagi: { type: string, nullable: true }
        oddzial_id: { type: integer, nullable: true }
        pozycje:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/InvoiceLine'
    DailyReportUpsert:
      type: object
      required: [data_raportu]
      properties:
        data_raportu: { type: string }
        opis_pracy: { type: string, nullable: true }
        podpis_url: { type: string, nullable: true }
        zadania:
          type: array
          items:
            type: object
            properties:
              task_id: { type: integer }
              czas_minuty: { type: integer }
              uwagi: { type: string, nullable: true }
        materialy:
          type: array
          items:
            type: object
            required: [nazwa]
            properties:
              nazwa: { type: string }
              ilosc: { type: number }
              jednostka: { type: string }
              koszt_jednostkowy: { type: number }
    OgledzinyCreate:
      type: object
      required: [klient_id]
      properties:
        klient_id: { type: integer }
        brygadzista_id: { type: integer, nullable: true }
        data_planowana: { type: string, nullable: true }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        notatki: { type: string, nullable: true }
    AiChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          minItems: 1
          items:
            type: object
            required: [role, content]
            properties:
              role: { type: string }
              content: { type: string }
        context: { type: string, maxLength: 2000 }
    TaskCreate:
      type: object
      required: [klient_nazwa, adres, miasto, data_planowana]
      properties:
        klient_nazwa: { type: string }
        klient_telefon: { type: string, nullable: true }
        adres: { type: string }
        miasto: { type: string }
        typ_uslugi: { type: string, nullable: true }
        priorytet: { type: string, nullable: true }
        wartosc_planowana: { oneOf: [{ type: number }, { type: string }], nullable: true }
        czas_planowany_godziny: { oneOf: [{ type: number }, { type: string }], nullable: true }
        data_planowana: { type: string }
        notatki_wewnetrzne: { type: string, nullable: true }
        oddzial_id: { oneOf: [{ type: integer }, { type: string }], nullable: true }
        ekipa_id: { oneOf: [{ type: integer }, { type: string }], nullable: true }
    TaskUpdate:
      type: object
      required: [klient_nazwa, adres, miasto, data_planowana]
      properties:
        klient_nazwa: { type: string }
        klient_telefon: { type: string, nullable: true }
        adres: { type: string }
        miasto: { type: string }
        typ_uslugi: { type: string, nullable: true }
        priorytet: { type: string, nullable: true }
        wartosc_planowana: { oneOf: [{ type: number }, { type: string }], nullable: true }
        wartosc_rzeczywista: { oneOf: [{ type: number }, { type: string }], nullable: true, description: Kwota po korekcie / dodatkowej pracy }
        czas_planowany_godziny: { oneOf: [{ type: number }, { type: string }], nullable: true }
        data_planowana: { type: string }
        notatki_wewnetrzne: { type: string, nullable: true }
        opis: { type: string, nullable: true, description: Zakres lub dodatkowa praca }
        notatki_klienta: { type: string, nullable: true }
    TaskAssign:
      type: object
      required: [ekipa_id]
      properties:
        ekipa_id: { oneOf: [{ type: integer }, { type: string }] }
    TaskStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Nowe, Zaplanowane, W_Realizacji, Zakonczone]
    TaskGeoOptional:
      type: object
      properties:
        lat: { oneOf: [{ type: number }, { type: string }], nullable: true }
        lng: { oneOf: [{ type: number }, { type: string }], nullable: true }
    TaskStartPayload:
      allOf:
        - $ref: '#/components/schemas/TaskGeoOptional'
      type: object
      properties:
        dmuchawa_filtr_ok: { type: boolean, description: Dmuchawa / filtr — OK (wymagane dla ekipy) }
        rebak_zatankowany: { type: boolean, description: Rębak zatankowany (wymagane dla ekipy) }
        kaski_zespol: { type: boolean, description: Kaski u pomocników i brygadzisty (wymagane dla ekipy) }
        bhp_potwierdzone: { type: boolean, description: Zapoznanie z krótkim BHP — musi być true dla ekipy }
    TaskStop:
      type: object
      required: [work_log_id]
      properties:
        lat: { oneOf: [{ type: number }, { type: string }], nullable: true }
        lng: { oneOf: [{ type: number }, { type: string }], nullable: true }
        work_log_id: { oneOf: [{ type: integer }, { type: string }] }
    TaskProblem:
      type: object
      required: [typ]
      properties:
        typ: { type: string }
    WycenaPatchStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    WycenaZatwierdz:
      type: object
      properties:
        ekipa_id: { oneOf: [{ type: integer }, { type: string }], nullable: true }
        data_wykonania: { type: string, nullable: true }
        wartosc_planowana: { oneOf: [{ type: number }, { type: string }], nullable: true }
    WycenaOdrzuc:
      type: object
      properties:
        powod: { type: string, nullable: true }
    UserAktywny:
      type: object
      required: [aktywny]
      properties:
        aktywny: { type: boolean }
    OddzialCreate:
      type: object
      required: [nazwa]
      properties:
        nazwa: { type: string }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        kod_pocztowy: { type: string, nullable: true }
        telefon: { type: string, nullable: true }
        email: { type: string, nullable: true }
        kierownik_id: { type: integer, nullable: true }
    OddzialWrite:
      type: object
      description: Częściowa aktualizacja oddziału (wszystkie pola opcjonalne)
      properties:
        nazwa: { type: string }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        kod_pocztowy: { type: string, nullable: true }
        telefon: { type: string, nullable: true }
        email: { type: string, nullable: true }
        kierownik_id: { type: integer, nullable: true }
    DelegacjaCreate:
      type: object
      required: [ekipa_id, oddzial_z, oddzial_do, data_od]
      properties:
        ekipa_id: { type: integer }
        oddzial_z: { type: integer }
        oddzial_do: { type: integer }
        data_od: { type: string }
        data_do: { type: string, nullable: true }
        cel: { type: string, nullable: true }
        uwagi: { type: string, nullable: true }
    DelegacjaStatusBody:
      type: object
      required: [status]
      properties:
        status: { type: string }
    PrzeniesPracownika:
      type: object
      required: [oddzial_id]
      properties:
        oddzial_id: { type: integer }
    EkipaCreate:
      type: object
      required: [nazwa]
      properties:
        nazwa: { type: string }
        brygadzista_id: { type: integer, nullable: true }
        oddzial_id: { type: integer, nullable: true }
    EkipaUpdate:
      type: object
      properties:
        nazwa: { type: string }
        brygadzista_id: { type: integer, nullable: true }
    TeamMemberAdd:
      type: object
      required: [user_id]
      properties:
        user_id: { type: integer }
        rola: { type: string }
    RoleCreate:
      type: object
      required: [nazwa]
      properties:
        nazwa: { type: string }
        kolor: { type: string, nullable: true }
        opis: { type: string, nullable: true }
        poziom: { type: integer }
        uprawnienia:
          type: object
          additionalProperties: { type: boolean }
    RoleUpdate:
      type: object
      properties:
        nazwa: { type: string, nullable: true }
        kolor: { type: string, nullable: true }
        opis: { type: string, nullable: true }
        poziom: { type: integer, nullable: true }
        aktywna: { type: boolean }
        uprawnienia:
          type: object
          additionalProperties: { type: boolean }
    GodzinyCreate:
      type: object
      required: [task_id, godziny, data_pracy]
      properties:
        task_id: { type: integer }
        godziny: { type: number }
        data_pracy: { type: string }
    GodzinyStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Potwierdzone, Odrzucone]
    FlotaPojazdCreate:
      type: object
      required: [marka, model, nr_rejestracyjny]
      properties:
        marka: { type: string }
        model: { type: string }
        nr_rejestracyjny: { type: string }
        rok_produkcji: { type: integer, nullable: true }
        typ: { type: string, nullable: true }
        ekipa_id: { type: integer, nullable: true }
        data_przegladu: { type: string, nullable: true }
        data_ubezpieczenia: { type: string, nullable: true }
        przebieg: { type: number, nullable: true }
        notatki: { type: string, nullable: true }
        oddzial_id: { type: integer, nullable: true }
    FlotaSprzetCreate:
      type: object
      required: [nazwa]
      properties:
        nazwa: { type: string }
        typ: { type: string, nullable: true }
        nr_seryjny: { type: string, nullable: true }
        rok_produkcji: { type: integer, nullable: true }
        ekipa_id: { type: integer, nullable: true }
        data_przegladu: { type: string, nullable: true }
        koszt_motogodziny: { type: number, nullable: true }
        notatki: { type: string, nullable: true }
        oddzial_id: { type: integer, nullable: true }
    FlotaNaprawaCreate:
      type: object
      required: [typ_zasobu, zasob_id, data_naprawy]
      properties:
        typ_zasobu: { type: string }
        zasob_id: { type: integer }
        nr_faktury: { type: string, nullable: true }
        data_naprawy: { type: string }
        koszt: { type: number, nullable: true }
        opis_usterki: { type: string, nullable: true }
        opis_naprawy: { type: string, nullable: true }
        wykonawca: { type: string, nullable: true }
        status: { type: string, nullable: true }
        oddzial_id: { type: integer, nullable: true }
    FlotaStatusBody:
      type: object
      required: [status]
      properties:
        status: { type: string }
    SmsWyslij:
      type: object
      required: [telefon, tresc]
      properties:
        telefon: { type: string }
        tresc: { type: string }
        task_id: { type: integer, nullable: true }
    SmsZlecenie:
      type: object
      required: [typ]
      properties:
        typ: { type: string, description: "Szablon, np. zaplanowane, w_drodze, problem" }
        powod: { type: string, nullable: true }
    SmsBulk:
      type: object
      required: [typ]
      properties:
        typ: { type: string }
        data: { type: string, description: "YYYY-MM-DD, domyślnie dziś" }
    NotificationCreate:
      type: object
      required: [to_user_id, typ, tresc]
      properties:
        to_user_id: { type: integer }
        task_id: { type: integer, nullable: true }
        typ: { type: string }
        tresc: { type: string }
    TelefonPolaczDoKlienta:
      type: object
      required: [do]
      properties:
        do:
          type: string
          description: Numer klienta (np. 791234567 lub +48791234567)
        task_id: { type: integer, nullable: true }
    InvoiceStatusBody:
      type: object
      required: [status]
      properties:
        status: { type: string }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
