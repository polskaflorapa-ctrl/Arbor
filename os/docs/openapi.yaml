        "403":
          description: Brygadzista / Pomocnik — `TELEFON_TEAM_ROLE_FORBIDDEN`
  /telefon/rozmowy/{id}/nagranie:
    get:
      summary: Odtwarzanie / pobranie zarchiwizowanego nagrania
      description: |
        Dostęp wg roli jak przy `GET /telefon/rozmowy/{id}` (kierownik / dyrektor / administrator — dowolna rozmowa).
        Zwraca strumień audio (lokalne archiwum), przekierowanie 302 (presigned URL do S3) lub na plik w Google Drive,
        jeśli po przetworzeniu webhooka zapisano archiwum (`PHONE_RECORDING_STORAGE`). Gdy archiwum wyłączone lub jeszcze brak — `404`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ciało audio lub przekierowanie do zewnętrznego URL
        "302":
          description: Przekierowanie do S3 (presigned) lub widoku pliku w Google Drive
        "403":
          description: Brygadzista / Pomocnik — `TELEFON_TEAM_ROLE_FORBIDDEN`
        "404":
          description: Brak rozmowy, brak dostępu lub brak zapisanego nagrania
