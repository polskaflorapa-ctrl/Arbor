openapi: 3.0.3
info:
  title: ARBOR-OS API
  version: "2.1.1"
  description: |
    REST API systemu ARBOR-OS. Odpowiedzi błędów zawierają `error` (po polsku), opcjonalnie `code` (stabilny identyfikator), `requestId`.
servers:
  - url: /api
paths:
  /health:
    get:
      summary: Stan serwera
      responses:
        "200":
          description: OK
  /ready:
    get:
      summary: Gotowość (baza danych)
      responses:
        "200":
          description: Baza dostępna
        "503":
          description: Baza niedostępna
  /auth/login:
    post:
      summary: Logowanie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, haslo]
              properties:
                login: { type: string }
                haslo: { type: string }
      responses:
        "200":
          description: Token JWT
        "400":
          description: Walidacja (Zod) — `code: VALIDATION_FAILED`
        "401":
          description: Błędne dane — `code: LOGIN_INVALID_CREDENTIALS`
        "429":
          description: Limit prób — `code: LOGIN_TOO_MANY_ATTEMPTS`
  /tasks/wszystkie:
    get:
      summary: Lista zleceń
      security: [{ bearerAuth: [] }]
      parameters:
        - name: oddzial_id
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          description: Paginacja (1–100); jeśli podane, odpowiedź `{ items, total, limit, offset }`
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica zleceń lub obiekt stronicowany
  /docs/openapi.yaml:
    get:
      summary: Specyfikacja OpenAPI (ten plik)
      responses:
        "200":
          description: YAML
  /metrics:
    get:
      summary: Metryki Prometheus (włączone gdy METRICS_ENABLED=true)
      responses:
        "200":
          description: text/plain
  /audit:
    get:
      summary: Rejestr audytu (tylko Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
        - name: action
          in: query
          schema: { type: string }
        - name: entity_type
          in: query
          schema: { type: string }
        - name: from
          in: query
          description: Filtr początku okresu (timestamptz)
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
      responses:
        "200":
          description: "{ items, total, limit, offset }"
        "403":
          description: Brak roli
  /klienci:
    get:
      summary: Lista klientów
      security: [{ bearerAuth: [] }]
      parameters:
        - name: szukaj
          in: query
          schema: { type: string }
        - name: miasto
          in: query
          schema: { type: string }
        - name: limit
          in: query
          description: Paginacja 1–100 → `{ items, total, limit, offset }`
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tablica lub obiekt stronicowany
    post:
      summary: Nowy klient (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KlientWrite'
      responses:
        "201":
          description: Utworzony klient
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /wyceny:
    get:
      summary: Lista wycen
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status_akceptacji
          in: query
          schema: { type: string, enum: [oczekuje, zatwierdzono, odrzucono] }
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowa wycena (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WycenaCreate'
      responses:
        "201":
          description: Utworzona wycena
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /uzytkownicy:
    get:
      summary: Lista użytkowników
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowy użytkownik (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        "200":
          description: `{ id, message }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /ksiegowosc/ustawienia:
    get:
      summary: Ustawienia firmy (księgowość)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Obiekt ustawień lub `{}`
    put:
      summary: Zapis ustawień firmy (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanySettingsWrite'
      responses:
        "200":
          description: Zapisano
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /ksiegowosc/faktury:
    get:
      summary: Lista faktur (księgowość)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: oddzial_id
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string }
        - name: rok
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tablica lub obiekt stronicowany
    post:
      summary: Nowa faktura (księgowość, walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
      responses:
        "200":
          description: `{ id, numer }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /tasks/moje:
    get:
      summary: Zlecenia na dany dzień (brygadzista / ekipa)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: data
          in: query
          description: Data YYYY-MM-DD (domyślnie dziś)
          schema: { type: string }
      responses:
        "200":
          description: Tablica zleceń
  /ogledziny:
    get:
      summary: Lista oględzin
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowe oględziny (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OgledzinyCreate'
      responses:
        "201":
          description: Utworzone oględziny
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /raporty-dzienne:
    get:
      summary: Raporty dzienne
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Utwórz lub zaktualizuj raport dzienny (walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyReportUpsert'
      responses:
        "200":
          description: `{ success, id, message }`
        "400":
          description: Walidacja lub reguły biznesowe
  /mobile/ustawienia:
    get:
      summary: Ustawienia firmy (mobile)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Obiekt ustawień lub `{}`
    put:
      summary: Zapis ustawień firmy (mobile, walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanySettingsWrite'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /mobile/faktury:
    get:
      summary: Faktury (aplikacja mobilna)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowa faktura (mobile, walidacja Zod)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
      responses:
        "200":
          description: `{ success, id, numer }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /mobile/faktury/stats:
    get:
      summary: Statystyki faktur (mobile)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Agregaty `total`, `przychod_total`, `oplacone`, `nieoplacone`, itd.
  /mobile/faktury/{id}:
    get:
      summary: Faktura po id (mobile)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Faktura + `pozycje`
        "404":
          description: Nie znaleziono
    delete:
      summary: Usunięcie faktury (tylko Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
        "403":
          description: Brak roli
        "404":
          description: Nie znaleziono
  /mobile/faktury/{id}/status:
    put:
      summary: Zmiana statusu faktury (mobile)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceStatusBody'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
        "404":
          description: Nie znaleziono
  /mobile/rozliczenia:
    get:
      summary: Rozliczenia / sumy faktur (rok, opcjonalnie miesiąc)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: rok
          in: query
          schema: { type: integer }
        - name: miesiac
          in: query
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        "200":
          description: Sumy + tablica `miesiace`
  /role:
    get:
      summary: Role systemowe
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowa rola (Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreate'
      responses:
        "201":
          description: Utworzona rola
        "400":
          description: Duplikat nazwy / walidacja — `code: VALIDATION_FAILED`
  /role/permissions/schema:
    get:
      summary: Schemat uprawnień (UI)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: JSON
  /oddzialy:
    get:
      summary: Oddziały
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowy oddział (Dyrektor / Administrator)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OddzialCreate'
      responses:
        "200":
          description: `{ id, message }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
        "403":
          description: Brak roli
  /ekipy:
    get:
      summary: Ekipy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: oddzial_id
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowa ekipa (bez roli Brygadzista)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EkipaCreate'
      responses:
        "200":
          description: `{ id, message }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /flota/katalog-pojazdow:
    get:
      summary: Katalog pojazdów do wyboru (dane z importu Excel → JSON)
      description: |
        Zwraca listę z `data/flota-pojazdy-katalog.json` (pole `arkusz` = nazwa arkusza z pliku źródłowego).
        Odświeżenie pliku: `npm run flota:katalog -- \"ścieżka/do/Данные по машинам.xlsx\"`
      security: [{ bearerAuth: [] }]
      parameters:
        - name: arkusz
          in: query
          description: Filtr dokładnej nazwy arkusza (np. Kraków)
          schema: { type: string, maxLength: 80 }
        - name: q
          in: query
          description: Szukanie po numerze rejestracyjnym, marce, modelu, VIN, notatce
          schema: { type: string, maxLength: 80 }
      responses:
        "200":
          description: |
            `{ liczba, arkusze[], zrodlo, wygenerowano, items[] }` — element `items`: `arkusz`, `marka`, `model`, `nr_rejestracyjny`, `vin`, `notatki`
  /flota/pojazdy:
    get:
      summary: Pojazdy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: oddzial_id
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowy pojazd
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlotaPojazdCreate'
      responses:
        "200":
          description: `{ id }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /flota/pojazdy/{id}/status:
    put:
      summary: Status pojazdu
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlotaStatusBody'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /flota/sprzet:
    get:
      summary: Sprzęt / maszyny
      security: [{ bearerAuth: [] }]
      parameters:
        - name: oddzial_id
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowy wpis sprzętu
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlotaSprzetCreate'
      responses:
        "200":
          description: `{ id }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /flota/sprzet/{id}/status:
    put:
      summary: Status sprzętu
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlotaStatusBody'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /flota/naprawy:
    get:
      summary: Historia napraw
      security: [{ bearerAuth: [] }]
      parameters:
        - name: oddzial_id
          in: query
          schema: { type: integer }
        - name: typ_zasobu
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Nowa naprawa
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlotaNaprawaCreate'
      responses:
        "200":
          description: `{ id }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /godziny/moje:
    get:
      summary: Godziny pomocnika
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
  /notifications:
    get:
      summary: Powiadomienia dla zalogowanego użytkownika
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Tablica lub `{ items, total, limit, offset }`
    post:
      summary: Wysłanie powiadomienia do użytkownika
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreate'
      responses:
        "200":
          description: `{ message }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /notifications/odczytaj-wszystkie:
    put:
      summary: Oznaczenie wszystkich jako odczytane
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
  /notifications/{id}/odczytaj:
    put:
      summary: Oznaczenie jednego powiadomienia jako odczytane
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /sms/wyslij:
    post:
      summary: Ręczne wysłanie SMS (Twilio)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsWyslij'
      responses:
        "200":
          description: `{ success, sid }`
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
        "500":
          description: Twilio / błąd wysyłki
  /sms/zlecenie/{id}:
    post:
      summary: SMS z szablonu dla zlecenia (aktualizuje status przy wybranych typach)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsZlecenie'
      responses:
        "200":
          description: OK
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
        "404":
          description: Zlecenie nie znalezione
        "500":
          description: Twilio / błąd
  /sms/wyslij-do-wszystkich:
    post:
      summary: Masowe SMS dla zleceń na datę (Dyrektor / Administrator / Kierownik)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsBulk'
      responses:
        "200":
          description: Podsumowanie wysyłki
        "403":
          description: Brak roli
        "400":
          description: Walidacja — `code: VALIDATION_FAILED`
  /sms/test:
    get:
      summary: Diagnostyka konfiguracji Twilio
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Obiekt ze statusem konfiguracji
  /telefon/polacz-do-klienta:
    post:
      summary: Telefonia (Twilio Voice) — połączenie z klientem przez Twój telefon z profilu
      description: |
        Wymaga `PUBLIC_BASE_URL` (publiczny HTTPS), `TWILIO_*` oraz uzupełnionego `telefon` użytkownika w bazie.
        Twilio najpierw dzwoni na numer pracownika; po odebraniu pobiera TwiML z `/api/telefon/twiml/dial?t=…` i łączy z numerem `do`.
        Połączenie z klientem jest **nagrywane** (`record-from-answer-dual`); po zakończeniu nagrania webhook uruchamia **transkrypcję** (OpenAI `OPENAI_API_KEY`) i **krótki raport AI** (Anthropic `ANTHROPIC_API_KEY`). Bez OpenAI status `needs_transcription`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelefonPolaczDoKlienta'
      responses:
        "200":
          description: `{ success, sid, message }`
        "400":
          description: Walidacja lub brak telefonu pracownika — `code: VALIDATION_FAILED` / `TELEFON_STAFF_PHONE_MISSING`
        "403":
          description: Rola ekipy polowej — `code: TELEFON_TEAM_ROLE_FORBIDDEN` (Brygadzista / Pomocnik nie dzwonią do klientów z tego endpointu)
        "503":
          description: Brak `PUBLIC_BASE_URL` lub Twilio — `TELEFON_PUBLIC_URL_MISSING` / `TELEFON_TWILIO_NOT_CONFIGURED`
        "500":
          description: Błąd Twilio
  /telefon/twiml/dial:
    get:
      summary: TwiML — wywoływane przez serwery Twilio (bez tokenu API)
      parameters:
        - name: t
          in: query
          required: true
          description: Krótkotrwały JWT (`aud: twilio-twiml`) z numerem docelowym
          schema: { type: string }
      responses:
        "200":
          description: `text/xml` — TwiML z `<Dial record="record-from-answer-dual">` i `recordingStatusCallback` na `/api/telefon/webhooks/recording`
  /telefon/rozmowy:
    get:
      summary: Lista rozmów z nagraniami / transkryptami / raportami
      description: |
        **Kierownik**, **Dyrektor** i **Administrator** — wszystkie rozmowy w systemie.
        **Brygadzista / Pomocnik** — brak dostępu (`403` `TELEFON_TEAM_ROLE_FORBIDDEN`). Pozostałe role — tylko własne rozmowy (`user_id`).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
