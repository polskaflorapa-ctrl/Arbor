            Osobny snapshot linii w `daily_payroll` jak przy export.csv (chyba że `PAYROLL_EXPORT_SNAPSHOT=0`).
            Jeśli w OS ustawiono `PAYROLL_ZIP_PASSWORD` — wpisy ZIP są szyfrowane (`aes256` domyślnie lub `zip20` przez `PAYROLL_ZIP_ENCRYPTION_METHOD`); nagłówek odpowiedzi `X-Payroll-Zip-Encryption` wskazuje metodę (bez ujawniania hasła).
