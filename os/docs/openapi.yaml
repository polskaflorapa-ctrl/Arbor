components:
  schemas:
    KlientWrite:
      type: object
      description: Co najmniej jedno z pól `telefon` lub `email` musi być niepuste (Zod).
      properties:
        imie: { type: string, nullable: true }
        nazwisko: { type: string, nullable: true }
        firma: { type: string, nullable: true }
        telefon: { type: string, nullable: true }
        email: { type: string, nullable: true }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        kod_pocztowy: { type: string, nullable: true }
        notatki: { type: string, nullable: true }
        zrodlo: { type: string, nullable: true }
    WycenaCreate:
      type: object
      required: [klient_nazwa]
      properties:
        klient_nazwa: { type: string }
        klient_telefon: { type: string, nullable: true }
        adres: { type: string, nullable: true }
        miasto: { type: string, nullable: true }
        typ_uslugi: { type: string, nullable: true }
        wartosc_szacowana: { oneOf: [{ type: number }, { type: string }], nullable: true }
        opis: { type: string, nullable: true }
        notatki_wewnetrzne: { type: string, nullable: true }
