# Render Blueprint — https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → wskaż to repo. Uzupełnij PUBLIC_BASE_URL (URL usługi) po pierwszym deployu (Twilio/webhook).
# Nie dodawaj ręcznie DATABASE_URL z lokalnego .env (z inną nazwą bazy) — nadpisze fromDatabase. Użyj Internal Database URL
# z instancji Postgres (końcówka .../arbor_db) albo usuń ręczny DATABASE_URL, żeby działało powiązanie z blueprintem.

databases:
  - name: arbor-postgres
    region: frankfurt
    databaseName: arbor_db
    plan: basic-256mb

services:
  - type: web
    name: arbor-os
    runtime: node
    region: frankfurt
    plan: free
    branch: master
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: arbor_db
      - key: DATABASE_URL
        fromDatabase:
          name: arbor-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
