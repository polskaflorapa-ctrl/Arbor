# UWAGA: preferowany blueprint jest w KORZENIU repozytorium — plik `/render.yaml` (Postgres + arbor-os + arbo-web naraz).
# Ten plik zostawiamy dla deployu tylko backendu z podkatalogu `os/` (np. stary workflow). Nowy stack: repo root → Blueprint.
#
# Render: https://render.com/docs/blueprint-spec
# Nie dodawaj ręcznie DATABASE_URL z lokalnego .env (z inną nazwą bazy) — nadpisze fromDatabase.

databases:
  - name: arbor-postgres
    region: frankfurt
    databaseName: arbor_db
    plan: basic-256mb

services:
  - type: web
    name: arbor-os
    runtime: node
    region: frankfurt
    plan: free
    branch: master
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: arbor_db
      - key: DATABASE_URL
        fromDatabase:
          name: arbor-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
