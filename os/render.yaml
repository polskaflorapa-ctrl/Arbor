# Standalone free backend deploy.
# Preferred free deploy is the root /render.yaml blueprint.

services:
  - type: web
    name: arbor-os
    runtime: node
    region: frankfurt
    plan: free
    branch: master
    rootDir: .
    buildCommand: npm ci
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/ready
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "1"
      - key: UPLOADS_DIR
        value: /tmp/arbor-uploads
      - key: PHONE_RECORDING_STORAGE
        value: local
      - key: PHONE_RECORDINGS_DIR
        value: /tmp/arbor-phone-recordings
      - key: METRICS_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        sync: false
