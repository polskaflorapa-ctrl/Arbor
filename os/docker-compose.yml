# Lokalna baza pod integrację / development
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arbor_dev
    volumes:
      - arbor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d arbor_dev']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  arbor_pg_data: {}
