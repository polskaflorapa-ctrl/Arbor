# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.12

commands:
  npm-install:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}-{{ checksum "web/package-lock.json" }}-{{ checksum "os/package-lock.json" }}-{{ checksum "mobile/package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}-{{ checksum "web/package-lock.json" }}-{{ checksum "os/package-lock.json" }}-{{ checksum "mobile/package-lock.json" }}
          paths:
            - ~/.npm

jobs:
  scripts:
    executor: node
    steps:
      - checkout
      - npm-install
      - run:
          name: Verify scripts
          command: npm run verify:scripts

  mobile:
    executor: node
    steps:
      - checkout
      - npm-install
      - run:
          name: Verify mobile
          command: npm run verify:mobile
      - run:
          name: Expo Doctor
          working_directory: mobile
          environment:
            EXPO_NO_TELEMETRY: "1"
          command: npx expo-doctor

  web:
    executor: node
    steps:
      - checkout
      - npm-install
      - run:
          name: Test web
          command: mkdir -p test-results/vitest && node web/scripts/run-vitest.cjs run --reporter=default --reporter=junit --outputFile.junit=test-results/vitest/results.xml
      - run:
          name: Build web
          command: npm run verify:web
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  os:
    executor: node
    steps:
      - checkout
      - npm-install
      - run:
          name: Lint Arbor OS
          command: npm run verify:os

  os-tests:
    executor: node
    steps:
      - checkout
      - npm-install
      - run:
          name: Test Arbor OS
          command: mkdir -p test-results/jest && JEST_JUNIT_OUTPUT_DIR="$(pwd)/test-results/jest" JEST_JUNIT_OUTPUT_NAME=results.xml npm test -w arbor-os -- --reporters=default --reporters=jest-junit
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  deploy-ready:
    executor: node
    steps:
      - checkout
      - npm-install
      - run:
          name: Deploy preflight check
          command: npm run deploy:ready:check
      - run:
          name: Build web
          command: npm run verify:web
      - run:
          name: Typecheck mobile
          command: npm run typecheck -w arbor-mobile

  verify-green:
    executor: node
    steps:
      - run:
          name: All verify jobs passed
          command: echo "verify OK"

  deploy-ready-green:
    executor: node
    steps:
      - run:
          name: Deploy ready check passed
          command: echo "deploy-ready OK"

workflows:
  verify:
    jobs:
      - scripts
      - mobile
      - web
      - os
      - os-tests
      - verify-green:
          requires:
            - scripts
            - mobile
            - web
            - os
            - os-tests

  deploy-ready:
    jobs:
      - deploy-ready:
          filters:
            branches:
              only:
                - main
                - master
      - deploy-ready-green:
          requires:
            - deploy-ready
          filters:
            branches:
              only:
                - main
                - master
