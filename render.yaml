# Render Blueprint - ARBOR free-first stack.
# Create in Render as: New -> Blueprint -> this GitHub repo -> branch master.
#
# Free setup:
# - arbor-os: Render Free web service
# - arbor-web: Render Static site
# - DATABASE_URL: set manually from Neon Free Postgres
#
# Important limitation: Render Free has an ephemeral filesystem. Uploaded photos,
# sketches, PDFs and recordings can disappear after restart/redeploy. For real
# company usage move uploads to S3/R2/Supabase Storage or upgrade API hosting.

services:
  - type: web
    name: arbor-os
    runtime: node
    region: frankfurt
    plan: free
    rootDir: os
    buildCommand: npm ci
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/ready/
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "1"
      - key: UPLOADS_DIR
        value: /tmp/arbor-uploads
      - key: UPLOAD_STORAGE
        value: s3
      - key: PHONE_RECORDING_STORAGE
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: S3_UPLOAD_PREFIX
        value: uploads
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: METRICS_ENABLED
        value: "false"
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_CONNECT_TIMEOUT_MS
        value: "10000"
      - key: DB_IDLE_TIMEOUT_MS
        value: "10000"
      - key: CORS_ORIGINS
        sync: false
      # SMS — Zadarma (priorytet) LUB Twilio (fallback)
      # Zadarma: zadarma.com → Panel → API → klucz i sekret
      - key: ZADARMA_API_KEY
        sync: false
      - key: ZADARMA_API_SECRET
        sync: false
      # Zadarma: opcjonalny nadawca SMS (nazwa, max 11 znaków), np. "ARBOR"
      - key: ZADARMA_CALLER_ID
        sync: false
      # Twilio (opcjonalny fallback — zostaw puste jeśli używasz Zadarma)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      # Public landing page demo request notifications.
      - key: DEMO_REQUEST_WEBHOOK_URL
        sync: false
      - key: DEMO_REQUEST_TELEGRAM_ENABLED
        value: "false"
      - key: DEMO_REQUEST_TELEGRAM_BOT_TOKEN
        sync: false
      - key: DEMO_REQUEST_TELEGRAM_CHAT_ID
        sync: false
      - key: DEMO_REQUEST_TELEGRAM_PARSE_MODE
        value: HTML
      # Rate limiting Redis (Upstash Free tier)
      - key: RATE_LIMIT_STORE
        value: redis
      - key: RATE_LIMIT_REDIS_URL
        sync: false
      - key: LOGIN_RATE_LIMIT_STORE
        value: redis
      - key: LOGIN_RATE_LIMIT_REDIS_URL
        sync: false
      # Sentry
      - key: SENTRY_DSN
        sync: false
      # AI pomocnik (asystent ARBOR-OS w webie + analiza zdjęć w mobile).
      # Wklej klucz w panelu Render → Environment. Bez niego /api/ai zwraca 503.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8

  - type: web
    name: arbor-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://arbor-os-b7k6.onrender.com/api
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_ENVIRONMENT
        value: production
      - key: VITE_APP_VERSION
        sync: false
      # Sentry Vite plugin (build-time)
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
