<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060908" />
    <meta name="description" content="ARBOR-OS - panel operacyjny" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>ARBOR-OS</title>
    <script>
      (function () {
        try {
          var ls = window.localStorage;
          if (!ls) return;
          function badScalar(t) {
            return t === '' || t === 'undefined' || t === 'null';
          }
          function stripZW(s) {
            return String(s).replace(/[\uFEFF\u200B-\u200D]/g, '').trim();
          }
          for (var i = ls.length - 1; i >= 0; i--) {
            var key = ls.key(i);
            if (!key) continue;
            var val = ls.getItem(key);
            if (val == null) continue;
            var t = stripZW(val);
            if (badScalar(t)) ls.removeItem(key);
          }
          var u = ls.getItem('user');
          if (u != null) {
            var ut = stripZW(u);
            if (badScalar(ut) || ut.charAt(0) !== '{') ls.removeItem('user');
          }
          var tok = ls.getItem('token');
          if (tok != null && badScalar(stripZW(tok))) ls.removeItem('token');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
