# UWAGA: preferowany blueprint jest w KORZENIU repozytorium — `/render.yaml` (API + front + baza w jednym).
# Ten plik: deploy samego statycznego frontu z katalogu `web/`. REACT_APP_API_URL musisz wtedy ustawić ręcznie w panelu.
#
# Dokumentacja: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: arbo-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    envVars:
      # Ustaw w Render Dashboard → Environment (wartość nie jest w repo)
      - key: REACT_APP_API_URL
        sync: false
