# Standalone web deploy.
# Preferred production deploy is the root /render.yaml blueprint.

services:
  - type: web
    name: arbor-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://arbor-os-b7k6.onrender.com/api
      - key: VITE_APP_VERSION
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
