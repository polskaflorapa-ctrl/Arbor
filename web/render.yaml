# Standalone web deploy.
# Preferred production deploy is the root /render.yaml blueprint.

services:
  - type: web
    name: arbor-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    autoDeployTrigger: commit
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
