<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060908" />
    <title>Polska Flora - nie znaleziono</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #060908;
        color: #f4f7f4;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 6vw, 48px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 24px;
        color: #b6c5b9;
        line-height: 1.55;
      }

      a {
        color: #9be67c;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nie znaleziono strony</h1>
      <p>
        Jesli ten komunikat pojawia sie dla adresu /api, sprawdz zmienna
        REACT_APP_API_URL w hostingu Netlify.
      </p>
      <a href="/">Wroc do panelu</a>
    </main>
  </body>
</html>
