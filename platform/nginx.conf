# nginx: statyczny front (dist/) + proxy do API (ten sam origin → bez CORS, działa WebSocket)
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API przyjmuje JSON do 5mb (ARBOR_JSON_LIMIT) — nginx nie może ucinać niżej.
  client_max_body_size 6m;

  # REST API → kontener api
  location /api/ {
    proxy_pass http://api:8790;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Realtime (Socket.IO) → upgrade WebSocket
  location /socket.io/ {
    proxy_pass http://api:8790;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # > interwał pingów engine.io (25 s), żeby chwilowa cisza nie zrywała socketów.
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }

  # SPA host + statyczne prototypy
  location / {
    try_files $uri $uri/ /index.html;
  }
}
