name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [staging]

env:
  NODE_VERSION: '22'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations when configured
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "STAGING_DATABASE_URL is not configured; skipping staging migration."
            exit 0
          fi
          npm run db:migrate -w arbor-os
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          NODE_ENV: production

      - name: Health check staging API
        run: |
          if [ -z "$STAGING_API_URL" ]; then
            echo "STAGING_API_URL is not configured; skipping API health check."
            exit 0
          fi
          for i in {1..30}; do
            curl -sf "https://$STAGING_API_URL/api/ready/" && break
            sleep 10
          done
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Health check staging Web
        run: |
          if [ -z "$STAGING_WEB_URL" ]; then
            echo "STAGING_WEB_URL is not configured; skipping web health check."
            exit 0
          fi
          for i in {1..10}; do
            curl -sf "https://$STAGING_WEB_URL" && break
            sleep 5
          done
        env:
          STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
