name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [staging]

env:
  NODE_VERSION: '22'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations (staging)
        run: |
          cd os
          npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          NODE_ENV: production

      - name: Deploy API to Render (staging)
        uses: render-actions/deploy@v1
        if: ${{ secrets.RENDER_STAGING_API_SERVICE_ID != '' }}
        with:
          service-id: ${{ secrets.RENDER_STAGING_API_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Deploy Web to Vercel (staging)
        uses: amondnet/vercel-action@v25
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./web

      - name: Health check staging API
        run: |
          for i in {1..30}; do
            curl -sf https://${{ secrets.STAGING_API_URL }}/api/ready/ && break
            sleep 10
          done

      - name: Health check staging Web
        run: |
          for i in {1..10}; do
            curl -sf https://${{ secrets.STAGING_WEB_URL }} && break
            sleep 5
          done