name: Keep backend awake

on:
  schedule:
    # Every 13 minutes — Render Free sleeps after 15 min of inactivity
    - cron: "*/13 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping arbor-os health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://arbor-os-b7k6.onrender.com/api/ready")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS"
          fi
