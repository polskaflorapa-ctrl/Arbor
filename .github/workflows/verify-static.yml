# Równolegle: mobile (typecheck+lint), web (jest+build), os (eslint). Bez API.
name: Verify static

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: verify-static-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run verify:mobile
      - name: Expo Doctor
        working-directory: mobile
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo-doctor

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run verify:web:test
      - run: npm run verify:web

  os:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run verify:os

  # Jedna „bramka” pod Branch protection → Required status: „Verify static / all-green”
  all-green:
    name: all-green
    runs-on: ubuntu-latest
    needs: [mobile, web, os]
    steps:
      - run: echo "verify-static OK"
