# Mobile: typecheck + lint. Web: production build. OS: eslint. Bez działającego API.
name: Verify static

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mobile typecheck + lint, web build
        run: npm run verify:static
