name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  NPM_VERSION: '10'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint -w arbor-web

      - name: Lint os
        run: npm run lint -w arbor-os

      - name: Lint mobile
        run: npm run lint -w arbor-mobile

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arbor_test
        ports: 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done

      - name: Run migrations (os)
        run: |
          cd os
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/arbor_test npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arbor_test

      - name: Test os
        run: npm run test -w arbor-os
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arbor_test
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: Test web
        run: npm run test -w arbor-web

      - name: Test mobile
        run: npm run test -w arbor-mobile

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build -w arbor-web

      - name: Build os (verify compiles)
        run: |
          cd os
          npm run lint

      - name: Build mobile (verify compiles)
        run: |
          cd mobile
          npx expo-doctor

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build/
          retention-days: 7