name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  verify:
    name: Verify static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify scripts
        run: npm run verify:scripts

      - name: Verify web tests
        run: npm run verify:web:test

      - name: Verify web build
        run: npm run verify:web

      - name: Verify OS
        run: npm run verify:os:full

      - name: Verify mobile
        run: npm run verify:mobile
