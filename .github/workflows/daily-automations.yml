name: Daily automations

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. Warsaw is UTC+2 in summer and UTC+1 in winter,
    # so both slots run and the guard step below keeps only 06:30 Europe/Warsaw.
    - cron: "30 4 * * *"
    - cron: "30 5 * * *"

permissions:
  contents: read

concurrency:
  group: daily-automations-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Warsaw time guard
        id: guard
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          warsaw_time="$(TZ=Europe/Warsaw date +'%H:%M')"
          echo "Warsaw time: ${warsaw_time}"
          if [[ "$warsaw_time" == "06:30" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version-file: ".nvmrc"

      - name: Trigger ARBOR-OS daily automations
        if: steps.guard.outputs.run == 'true'
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: node os/scripts/trigger-daily-automations.js

      - name: Skip duplicate DST slot
        if: steps.guard.outputs.run != 'true'
        run: echo "Skipped because this UTC slot is not 06:30 in Europe/Warsaw."
